name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:start
      - run: pnpm db:reset
      - run: |
          eval "$(pnpm exec supabase status -o env)"
          export SUPABASE_URL="$API_URL"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          export SUPABASE_PUBLISHABLE_KEY="$PUBLISHABLE_KEY"
          pnpm test:integration
      - run: pnpm db:types
      - run: git diff --exit-code -- src/lib/supabase/database.types.ts
      - if: always()
        run: pnpm db:stop

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: |
          pnpm db:start
          pnpm db:reset
          eval "$(pnpm exec supabase status -o env)"
          export NEXT_PUBLIC_SUPABASE_URL="$API_URL"
          export NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$PUBLISHABLE_KEY"
          export SUPABASE_URL="$API_URL"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          pnpm test:e2e
      - if: always()
        run: pnpm db:stop
